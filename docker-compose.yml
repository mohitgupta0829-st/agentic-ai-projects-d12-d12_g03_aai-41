version: "3.9"

services:

  backend:
    build: ./backend
    container_name: retail-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/retail_researcher.db
      - FAISS_INDEX_PATH=/app/data/faiss_index
    volumes:
      - retail_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: retail-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  retail_data:
    driver: local
