name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔹 STEP 3 (ADD HERE)
    - name: Install Python Dependencies
      run: |
        pip install -r backend/requirements.txt

    - name: Run basic backend check
      run: |
        cd backend
        python main.py &
        sleep 5

    # 🔹 THEN YOUR DOCKER STEPS
    - name: Build Docker Images
      run: docker-compose build

    - name: Run Containers
      run: docker-compose up -d
